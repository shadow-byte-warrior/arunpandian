    <script>
      window.addEventListener('error', function(e) {
        const msg = e.message || '';
        const isDynamicImportError = msg.includes('dynamically imported module') || msg.includes('Failed to fetch dynamically imported module');
        const isScriptOrLinkError = e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK');
        
        if (isDynamicImportError || isScriptOrLinkError) {
          const lastReload = sessionStorage.getItem('last-chunk-reload');
          const now = Date.now();
          if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
            sessionStorage.setItem('last-chunk-reload', now);
            window.location.reload();
          }
        }
      }, true);
    </script>
